<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兵役與學歷查詢</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        input, select, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #2c3e50; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>兵役與學歷年次查詢</h2>
    <input type="number" id="yr" value="115" placeholder="輸入民國年">
    <select id="rk">
        <option value="36">義務役士兵 (36歲除役)</option>
        <option value="50">尉官/士官 (50歲除役)</option>
    </select>
    <button onclick="cal()">立即查詢</button>
    <div id="res"></div>
</div>
<script>
    function cal() {
        let y = parseInt(document.getElementById('yr').value);
        let r = parseInt(document.getElementById('rk').value);
        let h = '<table><tr><th>年次</th><th>年齡</th><th>階段</th></tr>';
        for (let a = 18; a <= r; a++) {
            let b = y - a;
            let s = (a>=18&&a<=22)?'大學':(a>=22&&a<=24)?'碩士':(a>=24&&a<=28)?'博士':'';
            h += `<tr><td>${b}年次</td><td>${a}歲</td><td>${s} ${a==r?'★除役':''}</td></tr>`;
        }
        document.getElementById('res').innerHTML = h + '</table>';
    }
</script>
</body>
</html>
